<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windsurf VIP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      min-height: 300px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }
    h1 {
      font-size: 18px;
      font-weight: 700;
      color: #38bdf8;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 20px;
    }
    #startBtn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #startBtn:hover { opacity: 0.9; }
    #startBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .log-container {
      margin-top: 16px;
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 10px;
      background: #1e293b;
    }
    .log-entry {
      font-size: 11px;
      padding: 3px 0;
      border-bottom: 1px solid #334155;
      color: #94a3b8;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-entry.success { color: #4ade80; }
    .log-entry.error { color: #f87171; }
    .log-entry.info { color: #38bdf8; }
    .stats {
      margin-top: 16px;
      display: flex;
      gap: 10px;
    }
    .stat-box {
      flex: 1;
      background: #1e293b;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .stat-box .value {
      font-size: 20px;
      font-weight: 700;
      color: #38bdf8;
    }
    .stat-box .label {
      font-size: 10px;
      color: #64748b;
      margin-top: 2px;
    }
    #credentialsList {
      margin-top: 12px;
    }
    #exportBtn {
      margin-top: 10px;
      width: 100%;
      padding: 8px;
      border: 1px solid #334155;
      border-radius: 6px;
      background: transparent;
      color: #94a3b8;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #exportBtn:hover { background: #1e293b; }
  </style>
</head>
<body>
  <h1>Windsurf VIP</h1>
  <p class="subtitle">Auto Account Creator</p>

  <div id="sessionInfo" style="display:none; background:#1e293b; border-radius:8px; padding:10px; margin-bottom:12px; font-size:11px; color:#94a3b8;">
    <p style="color:#fbbf24; margin-bottom:4px; font-weight:600;">⚡ Pending session found</p>
    <p id="sessionDetail"></p>
  </div>

  <div style="display:flex; gap:8px;">
    <button id="startBtn" style="flex:1;">▶ Resume / Start</button>
    <button id="newBtn" style="flex:1; background:linear-gradient(135deg, #f59e0b, #ef4444);">🔄 New</button>
    <button id="clearBtn" style="flex:0 0 auto; background:#334155; padding:12px 14px;">🗑</button>
  </div>

  <div id="codeDisplay" style="display:none; background:#1e293b; border-radius:8px; padding:10px; margin:12px 0; text-align:center;">
    <p style="font-size:10px; color:#64748b; margin-bottom:4px;">Verification Code</p>
    <p id="codeValue" style="font-size:24px; font-weight:700; color:#4ade80; letter-spacing:4px; font-family:monospace;">------</p>
  </div>

  <div class="stats">
    <div class="stat-box">
      <div class="value" id="totalCount">0</div>
      <div class="label">Total Created</div>
    </div>
    <div class="stat-box">
      <div class="value" id="statusText">Idle</div>
      <div class="label">Status</div>
    </div>
  </div>

  <div class="log-container" id="logContainer"></div>

  <button id="exportBtn">📋 Export Credentials (JSON)</button>

  <script src="popup.js"></script>
</body>
</html>
